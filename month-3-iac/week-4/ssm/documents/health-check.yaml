schemaVersion: "2.2"
description: "SRE Lab - Health check document. Checks nginx status, disk, memory, and CPU."
parameters:
  ServiceName:
    type: String
    default: nginx
    description: "The name of the service to check."
mainSteps:
  - name: CheckNginxStatus
    action: aws:runShellScript
    inputs:
      runCommand:
        - echo "Checking status of {{ ServiceName }} service..."
        - systemctl is-active {{ ServiceName }} && echo "{{ ServiceName }} is running" || echo "{{ ServiceName }} is not running"
        - systemctl status {{ ServiceName }} --no-pager

  - name: CheckDiskAndCPU
    action: aws:runShellScript
    inputs:
      runCommand:
        - echo "=== DISK USAGE ==="
        - df -h
        - echo ""
        - echo "=== TOP CPU CONSUMERS==="
        - ps aux --sort=-%cpu | head -6

  - name: CheckMemory
    action: aws:runShellScript
    inputs:
      runCommand:
        - echo "=== MEMORY USAGE ==="
        - free -h
        - echo ""
        - echo "=== TOP MEMORY CONSUMERS ==="
        - ps aux --sort=-%mem | head -6

  - name: CheckFailedServices
    action: aws:runShellScript
    inputs:
      runCommand:
        - echo "=== FAILED SYSTEMD SERVICES ==="
        - systemctl list-units --state=failed --no-pager || echo "No failed services"
